[pytest]
testpaths = tests
python_files = test_*.py
python_functions = test_*
log_cli = true
log_cli_level = INFO
# Add the python directory to path so utils imports work
pythonpath = .
addopts = --html=reports/report.html --self-contained-html
log_file = reports/pytest.log
log_file_level = DEBUG
log_file_mode = w